name: Grain Trading Bot

on:
  schedule:
    - cron: '0 23 * * 0-4'    # 23:00 UTC dom-jue = 18:00 CT -> inicio ventana nocturna
    - cron: '0 0-12 * * 1-5'  # 00:00 a 12:00 UTC lun-vie, cada hora = 19:00-07:00 CT -> resto de la ventana nocturna, sin huecos
    - cron: '0 20 * * 1-5'    # 20:00 UTC lun-vie = 15:00 CT -> seguimiento / resumen por la tarde
  workflow_dispatch:
    inputs:
      modo:
        description: 'Modo de ejecución'
        required: true
        default: 'todo'
        type: choice
        options:
          - señales
          - seguimiento
          - resumen
          - todo

jobs:
  run-bot:
    name: Ejecutar bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/bot.py --modo ${{ github.event.inputs.modo || 'todo' }}
